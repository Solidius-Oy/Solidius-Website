<!doctype html>
<html lang="fi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Solidius</title>
        <style>
            :root {
                --brand: #3a52d1;
                --paper: #e6e7ed;
                --mist: #f2f3f7;
                --deep: #d2d5e0;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
            }

            body {
                display: grid;
                place-items: center;
                min-height: 100vh;
                position: relative;
                isolation: isolate;
                background: var(--paper);
                overflow: hidden;
            }

            body::before {
                content: "";
                position: absolute;
                inset: -8%;
                background:
                    radial-gradient(130% 95% at 12% 18%, var(--mist) 0%, transparent 58%),
                    radial-gradient(
                        95% 110% at 88% 90%,
                        rgba(58, 82, 209, 0.12) 0%,
                        transparent 62%
                    ),
                    linear-gradient(
                        130deg,
                        var(--paper) 0%,
                        #d9dce6 52%,
                        var(--deep) 100%
                    );
                z-index: -2;
            }

            body::after {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    repeating-radial-gradient(
                        circle at 0 0,
                        rgba(255, 255, 255, 0.3) 0 1px,
                        transparent 1px 3px
                    ),
                    repeating-radial-gradient(
                        circle at 100% 100%,
                        rgba(0, 0, 0, 0.08) 0 1px,
                        transparent 1px 4px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        rgba(0, 0, 0, 0.03) 0 1px,
                        transparent 1px 3px
                    );
                background-size:
                    240px 240px,
                    220px 220px,
                    180px 180px;
                opacity: 0.35;
                mix-blend-mode: soft-light;
                pointer-events: none;
                z-index: -1;
            }

            .logo-wrap {
                width: min(86vw, 920px);
                padding: clamp(16px, 3vw, 32px);
                animation: reveal 900ms ease-out both;
            }

            .logo {
                display: block;
                width: 100%;
                height: auto;
                max-height: 74vh;
                object-fit: contain;
                filter: drop-shadow(0 14px 32px rgba(29, 43, 113, 0.18));
            }

            @media (max-width: 700px) {
                .logo-wrap {
                    width: min(92vw, 560px);
                }
            }

            @keyframes reveal {
                from {
                    opacity: 0;
                    transform: translateY(14px) scale(0.985);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
        </style>
    </head>
    <body>
        <main class="logo-wrap" aria-label="Solidius placeholder">
            <img class="logo" src="Vertical.svg" alt="Solidius logo" />
        </main>
    </body>
</html>
